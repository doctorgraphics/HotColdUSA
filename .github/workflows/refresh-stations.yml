name: Refresh station catalog

on:
  workflow_dispatch:

  schedule:
    # Weekly refresh Monday morning UTC
    - cron: "23 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh station catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Refresh station catalog
        run: python -u scripts/refresh_stations.py

      - name: Commit updated station catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/stations.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh station catalog"
            git push
          fi
