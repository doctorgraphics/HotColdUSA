name: Refresh Station Catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Refresh Script
        run: python scripts/refresh_stations.py

      - name: Deploy to Data Storage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: data-storage
          keep_files: true  # Prevents deleting latest.json if it exists
