name: Refresh station catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Refresh station catalog
        run: python scripts/refresh_stations.py

      - name: Commit updated station catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stations.json
          git diff --cached --quiet || git commit -m "Refresh station catalog"
          git push
