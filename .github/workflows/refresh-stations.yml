name: Refresh Station Catalog

on:
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Refresh Script
        run: python scripts/refresh_stations.py

      - name: Deploy to Data Storage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: data-storage
          # Set force_orphan to false here if you want to keep the history of both files
          force_orphan: false
