name: Update Weather Data

on:
  schedule:
    - cron: "47 * * * *" # Runs every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Latest Observations
        run: python scripts/fetch_weather.py

      - name: Deploy to Data Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: data # This moves latest.json to its own branch
          force_orphan: true    # This keeps the branch size tiny
          commit_message: "Hourly Weather Update"
