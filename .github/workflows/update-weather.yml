name: Update Weather Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main (Scripts)
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Data Storage (Catalog)
        uses: actions/checkout@v4
        with:
          ref: data-storage
          path: data-repo

      - name: Sync Data Files to Runner
        run: |
          mkdir -p main-repo/data
          cp data-repo/stations.json main-repo/data/stations.json
          cp data-repo/records.json main-repo/data/records.json || echo "No records.json found yet"

      - name: Run Fetch Weather
        run: |
          cd main-repo
          python scripts/fetch_weather.py

      - name: Deploy to Data Storage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./main-repo/data
          publish_branch: data-storage
          keep_files: true # Keeps stations.json alive
