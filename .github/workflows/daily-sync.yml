name: Daily Climate Sync

on:
  schedule:
    - cron: "5 8 * * *" # 12:05 AM PST
  workflow_dispatch:   # Manual button for testing

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Data Storage
        uses: actions/checkout@v4
        with:
          ref: data-storage
          path: data-repo

      - name: Sync Data Files
        run: |
          mkdir -p main-repo/data
          # Copy current latest.json so we don't overwrite current weather
          cp data-repo/latest.json main-repo/data/latest.json || echo "No latest.json found yet"

      - name: Run Sync Script
        run: |
          cd main-repo
          python scripts/daily_sync.py

      - name: Deploy Update
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./main-repo/data
          publish_branch: data-storage
          keep_files: true
